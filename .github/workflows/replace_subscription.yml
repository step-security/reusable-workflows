name: Update validateSubscription

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Repository to update in owner/repo format"
        required: true
        type: string
      package_manager:
        description: "Specify package manager (npm or yarn)"
        required: false
        type: choice
        options:
          - npm
          - yarn
        default: npm
      use_private_packages:
        description: "Use private packages"
        required: false
        type: boolean
        default: false
      script:
        description: "Specify the npm/yarn script to run"
        required: false
        type: string
        default: "npm run build"
      yarn_version:
        description: "Yarn version to use if package_manager=yarn"
        required: false
        type: string
      working_directory:
        description: "Working directory inside repo"
        required: false
        type: string
        default: "."
      node_version:
        description: "Specify Node.js version (e.g., '18', '20', 'lts/*')"
        required: false
        type: string
        default: "20"

permissions: {}

jobs:
  update-subscription-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout automation repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.22"

      - name: Clone target repository
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          REPO_NAME: ${{ inputs.repo_name }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO_NAME}.git" target-repo

      - name: Install specific Yarn version if defined
        if: ${{ inputs.package_manager == 'yarn' && inputs.yarn_version != '' }}
        run: |
          corepack enable
          corepack prepare "yarn@${{ inputs.yarn_version }}" --activate
          echo "Activated Yarn version ${{ inputs.yarn_version }}"

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: |
            target-repo/${{ inputs.working_directory }}/package-lock.json
            target-repo/${{ inputs.working_directory }}/npm-shrinkwrap.json
            target-repo/${{ inputs.working_directory }}/yarn.lock

      - name: Authenticate npm with GitHub Packages (if using private packages)
        if: inputs.use_private_packages == true
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "@${{ github.repository_owner }}:registry=https://npm.pkg.github.com/" >> ~/.npmrc

      - name: Replace validateSubscription block
        working-directory: target-repo/${{ inputs.working_directory }}
        run: |
          go run "${GITHUB_WORKSPACE}/scripts/replace_validate_subscription.go"

      - name: Install dependencies
        working-directory: target-repo/${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.package_manager }}" == "npm" ]; then
            npm ci
          else
            yarn install --frozen-lockfile
          fi

      - name: Build project
        working-directory: target-repo/${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          SCRIPT="${{ inputs.script }}"
          eval "$SCRIPT" || echo "No build script found or failed, skipping."

      - name: Commit and push changes
        working-directory: target-repo
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes found"
            exit 0
          fi

          git add .
          git commit -m "chore: update validateSubscription for maintained actions"
          git push origin HEAD
